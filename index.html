<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wynk Dating</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    .page { max-width: 420px; margin: 0 auto; width: 100%; padding-top: 16px; }
    .greeting { font-size: 13px; color: var(--color-text-muted); margin-bottom: 2px; }
    .greeting-name { font-size: 24px; font-weight: 800; margin-bottom: 20px; }
    .menu-card {
      display: flex; align-items: center; gap: 16px;
      background: white; border-radius: 16px; padding: 18px;
      margin-bottom: 12px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.06);
      transition: transform 0.15s;
    }
    .menu-card:active { transform: scale(0.97); }
    .menu-icon {
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .menu-icon.purple { background: linear-gradient(135deg, #2563eb15, #7c3aed15); }
    .menu-icon.pink { background: linear-gradient(135deg, #ec489915, #f43f5e15); }
    .menu-icon.gold { background: linear-gradient(135deg, #d4af3715, #eab30815); }
    .menu-icon.blue { background: linear-gradient(135deg, #2563eb15, #3b82f615); }
    .menu-text { flex: 1; }
    .menu-title { font-weight: 700; font-size: 16px; }
    .menu-desc { font-size: 13px; color: var(--color-text-muted); margin-top: 2px; }
    .menu-arrow { color: var(--color-text-muted); font-size: 20px; }
    .badge {
      background: #f43f5e; color: white; font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 10px; margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="greeting">Welcome to</div>
    <div class="greeting-name">Wynk Dating 💘</div>

    <div class="menu-card" onclick="navTo('profile.html')">
      <div class="menu-icon purple">👤</div>
      <div class="menu-text">
        <div class="menu-title">My Profile</div>
        <div class="menu-desc">Edit your photos, bio &amp; preferences</div>
      </div>
      <div class="menu-arrow">›</div>
    </div>

    <div class="menu-card" onclick="navTo('matches.html')">
      <div class="menu-icon pink">💕</div>
      <div class="menu-text">
        <div class="menu-title">My Matches</div>
        <div class="menu-desc">Chat with your matched partners</div>
      </div>
      <div class="menu-arrow">›</div>
    </div>

    <div class="menu-card" onclick="navTo('premium.html')">
      <div class="menu-icon gold">⭐</div>
      <div class="menu-text">
        <div class="menu-title">Premium</div>
        <div class="menu-desc">Unlock unlimited messages &amp; more</div>
      </div>
      <div class="menu-arrow">›</div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#f8fafc'); }

    const urlParams = new URLSearchParams(window.location.search);
    const apiURL = urlParams.get('api_url') || '';
    const tgName = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name) || '';
    if (tgName) document.querySelector('.greeting-name').textContent = `Hey ${tgName} 💘`;

    function navTo(page) {
      window.location.href = page + (apiURL ? `?api_url=${encodeURIComponent(apiURL)}` : '');
    }
  </script>
</body>
</html>
