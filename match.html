<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>It's a Match! 🎉</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="match.css">
  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <!-- Canvas for full-screen confetti particle animation -->
  <canvas id="confettiCanvas"></canvas>

  <div class="match-container animate-fadein">
    <div class="sparkles-container"></div>
    
    <h1 class="match-title animate-bounce">It's a Match! 🎉</h1>
    <p class="match-subtitle animate-fadein">You and your partner liked each other!</p>

    <!-- Side-by-Side Avatar Cards with Center Heart -->
    <div class="celebration-scene">
      <div class="user-avatar-card u1-card animate-slideleft">
        <div class="avatar-frame">
          <img src="default_avatar.png" id="myAvatar" alt="My Photo">
        </div>
        <div class="user-name" id="myNameLabel">You</div>
      </div>

      <div class="match-symbol-container animate-pulse-scale">
        <div class="pulse-glow"></div>
        <div class="match-heart">❤️</div>
      </div>

      <div class="user-avatar-card u2-card animate-slideright">
        <div class="avatar-frame">
          <img src="default_avatar.png" id="partnerAvatar" alt="Partner Photo">
        </div>
        <div class="user-name" id="partnerNameLabel">Someone</div>
      </div>
    </div>

    <!-- Action Group -->
    <div class="action-container animate-slideup">
      <button class="glow-btn glow-btn-primary" id="chatNowBtn">Start Chatting 💬</button>
    </div>
  </div>

  <script src="match.js"></script>
</body>
</html>
