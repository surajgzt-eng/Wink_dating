<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    .chat-container {
      max-width: 420px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .chat-header {
      display: flex;
      align-items: center;
      padding: 12px 0;
      gap: 10px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .chat-header .back-btn {
      width: 32px; height: 32px;
      font-size: 18px;
      border-radius: 50%;
      background: rgba(0,0,0,0.04);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--color-text-muted);
    }
    .chat-header .partner-photo {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      background: #e2e8f0;
    }
    .chat-header .partner-info { flex: 1; }
    .chat-header .partner-name { font-weight: 700; font-size: 15px; }
    .chat-header .partner-status { font-size: 12px; color: var(--color-text-muted); }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .msg-bubble.own {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-bubble.other {
      align-self: flex-start;
      background: rgba(0,0,0,0.04);
      color: var(--color-text-main);
      border-bottom-left-radius: 4px;
    }
    .msg-time {
      font-size: 10px;
      color: inherit;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }
    .msg-bubble.other .msg-time { text-align: left; }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 12px 0;
      border-top: 1px solid rgba(0,0,0,0.06);
      align-items: flex-end;
    }
    .input-row input {
      flex: 1;
      background: rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 14px;
      padding: 12px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: var(--color-text-main);
      outline: none;
    }
    .input-row input:focus { border-color: var(--color-primary); }
    .send-btn {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      color: white;
      border: none;
      width: 44px; height: 44px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:active { transform: scale(0.95); }

    .loading-msgs {
      text-align: center;
      padding: 40px;
      color: var(--color-text-muted);
      font-size: 14px;
    }
    .empty-chat {
      text-align: center;
      padding: 40px 20px;
      color: var(--color-text-muted);
    }
    .empty-chat .icon { font-size: 40px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="back-btn" id="backBtn">←</div>
      <img class="partner-photo" id="partnerPhoto" src="default_avatar.png" onerror="this.src='default_avatar.png'">
      <div class="partner-info">
        <div class="partner-name" id="partnerNameEl">Loading...</div>
        <div class="partner-status">Matched</div>
      </div>
    </div>
    <div class="messages-area" id="messagesArea">
      <div class="loading-msgs">Loading messages...</div>
    </div>
    <div class="input-row">
      <input type="text" id="msgInput" placeholder="Type a message..." maxlength="500">
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
  <script src="chat.js"></script>
</body>
</html>
